<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management — Ordering System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root{--g1:#6C63FF;--g2:#A855F7;--g3:#EC4899;--g4:#3B82F6;--g5:#06B6D4;--sidebar-w:230px;--bg:#f0f0fb;--surface:#ffffff;--surface2:#f7f7fd;--border:#e8e8f4;--text:#1a1a2e;--text2:#4a4a6a;--text3:#9090b8;--green:#059669;--green-light:#f0fdf4;--amber:#d97706;--amber-light:#fffbeb;--red:#dc2626;--red-light:#fef2f2;--accent:#6C63FF;--accent-light:#f0eeff;--radius:14px;--shadow:0 2px 8px rgba(108,99,255,.06),0 1px 3px rgba(108,99,255,.04);--shadow-md:0 8px 32px rgba(108,99,255,.13),0 2px 8px rgba(168,85,247,.08)}
        *,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
        body{font-family:'Poppins',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex}

        /* SIDEBAR */
        .sidebar{width:var(--sidebar-w);background:#0f0c29;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;overflow:hidden}
        .sidebar-blob{position:absolute;border-radius:50%;filter:blur(56px);mix-blend-mode:screen;pointer-events:none;animation:sbDrift 14s ease-in-out infinite alternate}
        .sb-b1{width:280px;height:280px;background:radial-gradient(circle,rgba(108,99,255,.9) 0%,transparent 70%);top:-80px;left:-80px;animation-delay:0s}
        .sb-b2{width:220px;height:220px;background:radial-gradient(circle,rgba(168,85,247,.8) 0%,transparent 70%);top:35%;left:-40px;animation-delay:-4s}
        .sb-b3{width:200px;height:200px;background:radial-gradient(circle,rgba(236,72,153,.75) 0%,transparent 70%);bottom:80px;right:-60px;animation-delay:-7s}
        .sb-b4{width:160px;height:160px;background:radial-gradient(circle,rgba(59,130,246,.6) 0%,transparent 70%);bottom:20%;left:20px;animation-delay:-10s}
        @keyframes sbDrift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(20px,-25px) scale(1.1)}100%{transform:translate(-15px,20px) scale(.95)}}
        .sidebar-waves{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;opacity:.55}
        .sidebar-grain{position:absolute;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.07'/%3E%3C/svg%3E");opacity:.3;pointer-events:none}
        .sidebar-brand{padding:24px 20px 18px;border-bottom:1px solid rgba(255,255,255,.07);position:relative;z-index:2}
        .brand-mark{display:flex;align-items:center;gap:10px}
        .brand-icon{width:34px;height:34px;background:linear-gradient(135deg,var(--g1),var(--g3));border-radius:9px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 14px rgba(236,72,153,.4);flex-shrink:0}
        .brand-icon svg{width:18px;height:18px;fill:none;stroke:white;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
        .brand-name{font-size:14.5px;font-weight:700;color:#f9fafb;letter-spacing:-.3px}
        .brand-sub{font-size:10.5px;color:rgba(255,255,255,.35);margin-top:1px}
        .sidebar-nav{flex:1;padding:14px 12px;overflow-y:auto;position:relative;z-index:2}
        .nav-section-label{font-size:9.5px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.25);padding:0 8px;margin:16px 0 5px}
        .nav-section-label:first-child{margin-top:0}
        .nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:9px;color:rgba(255,255,255,.55);text-decoration:none;font-size:13px;font-weight:500;transition:background .2s,color .2s,box-shadow .2s;margin-bottom:2px;position:relative;overflow:hidden}
        .nav-item:hover{background:rgba(255,255,255,.09);color:rgba(255,255,255,.9)}
        .nav-item.active{background:linear-gradient(110deg,rgba(168,85,247,.35),rgba(236,72,153,.25));color:#fff;box-shadow:0 2px 14px rgba(236,72,153,.25),inset 0 0 0 1px rgba(236,72,153,.3);font-weight:600}
        .nav-item.active::before{content:'';position:absolute;left:0;top:20%;bottom:20%;width:3px;background:linear-gradient(180deg,var(--g2),var(--g3));border-radius:0 3px 3px 0}
        .nav-item svg{width:15px;height:15px;flex-shrink:0}
        .sidebar-footer{padding:14px 12px;border-top:1px solid rgba(255,255,255,.07);position:relative;z-index:2}
        .user-info{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:9px;background:rgba(255,255,255,.05);margin-bottom:8px}
        .user-avatar{width:30px;height:30px;background:linear-gradient(135deg,var(--g1),var(--g3));border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:700;flex-shrink:0;box-shadow:0 2px 8px rgba(236,72,153,.35)}
        .user-name{font-size:12.5px;font-weight:600;color:#f0f0ff}
        .user-role{font-size:10.5px;color:rgba(255,255,255,.3);margin-top:1px}
        .logout-btn{width:100%;padding:8px 10px;background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:8px;color:rgba(255,255,255,.4);font-size:12px;font-weight:500;cursor:pointer;font-family:'Poppins',sans-serif;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px}
        .logout-btn:hover{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.35);color:#fca5a5}
        .logout-btn svg{width:13px;height:13px}

        /* MAIN */
        .main-area{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-width:0}
        .topbar{background:rgba(255,255,255,.85);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border-bottom:1px solid rgba(108,99,255,.1);padding:0 32px;height:58px;display:flex;align-items:center;position:sticky;top:0;z-index:50;box-shadow:0 1px 24px rgba(108,99,255,.07)}
        .topbar-title{font-size:15.5px;font-weight:700;color:var(--text);letter-spacing:-.4px}
        .content{padding:28px 32px;flex:1}

        /* ALERTS */
        .alert{padding:12px 16px;border-radius:10px;font-size:12.5px;font-weight:600;margin-bottom:16px;border:1px solid}
        .alert-success{background:rgba(108,99,255,.07);color:var(--g1);border-color:rgba(108,99,255,.2)}
        .alert-error{background:var(--red-light);color:var(--red);border-color:#fecaca}

        /* CONTENT GRID */
        .content-grid{display:grid;grid-template-columns:380px 1fr;gap:20px}

        /* CARDS */
        .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
        .card-header{display:flex;align-items:center;justify-content:space-between;padding:20px 24px;border-bottom:1px solid var(--border)}
        .card-title{font-size:13px;font-weight:700;color:var(--text)}
        .card-body{padding:20px 24px}

        /* FORMS */
        .form-group{display:flex;flex-direction:column;gap:6px;margin-bottom:16px}
        .form-label{font-size:10.5px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px}
        .form-input,.form-select{padding:10px 13px;border:1.5px solid var(--border);border-radius:9px;background:var(--surface2);font-family:'Poppins',sans-serif;font-size:13.5px;color:var(--text);transition:border-color .2s,box-shadow .2s;width:100%}
        .form-input::placeholder{color:var(--text3)}
        .form-input:focus,.form-select:focus{outline:none;border-color:var(--g1);box-shadow:0 0 0 3px rgba(108,99,255,.1);background:var(--surface)}
        .form-select option{background:var(--surface)}

        /* BUTTONS */
        .btn-primary{padding:10px 20px;background:linear-gradient(110deg,var(--g4),var(--g1),var(--g2),var(--g3));background-size:200% 100%;color:white;border:none;border-radius:9px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:background-position .4s,transform .15s,box-shadow .2s;box-shadow:0 4px 16px rgba(168,85,247,.3);width:100%;margin-top:4px}
        .btn-primary:hover{background-position:right center;transform:translateY(-1px);box-shadow:0 6px 24px rgba(168,85,247,.4)}
        .btn-role{padding:6px 12px;background:rgba(108,99,255,.08);color:var(--g1);border:1px solid rgba(108,99,255,.2);border-radius:7px;font-family:'Poppins',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s}
        .btn-role:hover{background:linear-gradient(110deg,var(--g1),var(--g2));color:white;border-color:transparent;box-shadow:0 3px 10px rgba(108,99,255,.3)}
        .btn-password{padding:6px 12px;background:rgba(168,85,247,.08);color:var(--g2);border:1px solid rgba(168,85,247,.22);border-radius:7px;font-family:'Poppins',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s}
        .btn-password:hover{background:linear-gradient(110deg,var(--g2),var(--g3));color:white;border-color:transparent;box-shadow:0 3px 10px rgba(168,85,247,.3)}
        .btn-delete{padding:6px 12px;background:var(--red-light);color:var(--red);border:1px solid #fecaca;border-radius:7px;font-family:'Poppins',sans-serif;font-size:11.5px;font-weight:600;cursor:pointer;transition:all .15s}
        .btn-delete:hover{background:#fee2e2}
        .btn-cancel{padding:10px 18px;background:transparent;border:1.5px solid var(--border);border-radius:9px;color:var(--text2);font-family:'Poppins',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .15s}
        .btn-cancel:hover{background:var(--surface2)}
        .btn-modal{padding:10px 20px;background:linear-gradient(110deg,var(--g4),var(--g1),var(--g2),var(--g3));background-size:200%;color:white;border:none;border-radius:9px;font-family:'Poppins',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:background-position .4s,box-shadow .2s;box-shadow:0 3px 12px rgba(168,85,247,.3)}
        .btn-modal:hover{background-position:right center;box-shadow:0 5px 18px rgba(168,85,247,.4)}

        /* TABLE */
        .user-count{font-size:11.5px;color:var(--text3);margin-bottom:14px;font-weight:600}
        .table-wrap{overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        thead th{padding:10px 14px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--text3);background:var(--surface2);border-bottom:1px solid var(--border);white-space:nowrap}
        tbody td{padding:11px 14px;font-size:13px;color:var(--text);border-bottom:1px solid var(--border)}
        tbody tr:last-child td{border-bottom:none}
        tbody tr:hover td{background:var(--surface2)}
        .user-id{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text3)}
        .user-name-cell{font-weight:600;color:var(--text)}
        .badge{display:inline-flex;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600}
        .badge-admin{background:linear-gradient(90deg,rgba(108,99,255,.12),rgba(168,85,247,.12));color:var(--g1);border:1px solid rgba(108,99,255,.2)}
        .badge-staff{background:linear-gradient(90deg,rgba(168,85,247,.12),rgba(236,72,153,.12));color:var(--g2);border:1px solid rgba(168,85,247,.2)}
        .badge-user{background:rgba(144,144,184,.1);color:var(--text3);border:1px solid rgba(144,144,184,.2)}
        .action-group{display:flex;gap:6px}
        .empty-state{text-align:center;padding:48px 20px;color:var(--text3);font-size:13px}
        .empty-icon{font-size:2.5rem;margin-bottom:10px}

        /* MODAL */
        .modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,8,30,.5);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
        .modal-overlay.active{display:flex}
        .modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:28px 30px;width:100%;max-width:460px;box-shadow:var(--shadow-md);animation:slideUp .22s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
        .modal-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:22px}
        .modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:18px}

        @media(max-width:1024px){.content-grid{grid-template-columns:1fr}}
        @media(max-width:768px){.sidebar{transform:translateX(-100%)}.main-area{margin-left:0}.content{padding:16px}}
    </style>
</head>
<body>

<aside class="sidebar">
    <div class="sidebar-blob sb-b1"></div><div class="sidebar-blob sb-b2"></div><div class="sidebar-blob sb-b3"></div><div class="sidebar-blob sb-b4"></div>
    <svg class="sidebar-waves" viewBox="0 0 230 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
        <defs><linearGradient id="sw1" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#6C63FF" stop-opacity=".6"/><stop offset="100%" stop-color="#EC4899" stop-opacity=".4"/></linearGradient><linearGradient id="sw2" x1="100%" y1="0%" x2="0%" y2="100%"><stop offset="0%" stop-color="#A855F7" stop-opacity=".5"/><stop offset="100%" stop-color="#06B6D4" stop-opacity=".3"/></linearGradient></defs>
        <path d="M-20 150 C 60 80, 150 220, 260 150" stroke="url(#sw1)" stroke-width="2" fill="none"><animate attributeName="d" dur="8s" repeatCount="indefinite" values="M-20 150 C 60 80, 150 220, 260 150;M-20 170 C 50 100, 160 200, 260 130;M-20 150 C 60 80, 150 220, 260 150"/></path>
        <path d="M-20 320 C 80 250, 160 400, 260 320" stroke="url(#sw1)" stroke-width="1.5" fill="none"><animate attributeName="d" dur="11s" repeatCount="indefinite" values="M-20 320 C 80 250, 160 400, 260 320;M-20 300 C 70 260, 150 380, 260 300;M-20 320 C 80 250, 160 400, 260 320"/></path>
        <path d="M-20 500 C 70 430, 180 570, 260 500" stroke="url(#sw2)" stroke-width="1.8" fill="none"><animate attributeName="d" dur="9s" repeatCount="indefinite" values="M-20 500 C 70 430, 180 570, 260 500;M-20 480 C 80 450, 170 550, 260 480;M-20 500 C 70 430, 180 570, 260 500"/></path>
        <path d="M-20 680 C 100 610, 150 750, 280 680" stroke="url(#sw2)" stroke-width="1.2" fill="none"><animate attributeName="d" dur="13s" repeatCount="indefinite" values="M-20 680 C 100 610, 150 750, 280 680;M-20 660 C 90 630, 160 730, 280 660;M-20 680 C 100 610, 150 750, 280 680"/></path>
        <path d="M-20 850 C 80 800, 180 880, 280 840" stroke="#EC4899" stroke-width="1" fill="none" opacity=".35"><animate attributeName="d" dur="10s" repeatCount="indefinite" values="M-20 850 C 80 800, 180 880, 280 840;M-20 830 C 90 810, 170 870, 280 820;M-20 850 C 80 800, 180 880, 280 840"/></path>
    </svg>
    <div class="sidebar-grain"></div>
    <div class="sidebar-brand">
        <div class="brand-mark">
            <div class="brand-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="13" y2="16"/></svg></div>
            <div><div class="brand-name">Ordering System</div><div class="brand-sub">Management Portal</div></div>
        </div>
    </div>
    <nav class="sidebar-nav">
        <div class="nav-section-label">Main</div>
        <a href="/dashboard" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>Dashboard</a>
        <a href="/orders" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>Orders</a>
        <div class="nav-section-label">Admin</div>
        <a href="/items" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/></svg>Items</a>
        <a href="/users" class="nav-item active"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87M16 3.13a4 4 0 010 7.75"/></svg>Users</a>
        <a href="/labor" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>Labor</a>
        <a href="/reports" class="nav-item"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>Reports</a>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info"><div class="user-avatar">A</div><div><div class="user-name">Admin</div><div class="user-role">Administrator</div></div></div>
        <form th:action="@{/logout}" method="post"><button type="submit" class="logout-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sign Out</button></form>
    </div>
</aside>

<div class="main-area">
    <header class="topbar"><div class="topbar-title">User Management</div></header>
    <main class="content">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

        <div class="content-grid">
            <!-- Register Form -->
            <div class="card">
                <div class="card-header"><div class="card-title">Register New User</div></div>
                <div class="card-body">
                    <form th:action="@{/users/register}" method="post">
                        <div class="form-group"><label class="form-label">Username</label><input type="text" name="username" class="form-input" placeholder="e.g. juan123" required></div>
                        <div class="form-group"><label class="form-label">Password</label><input type="password" name="password" class="form-input" placeholder="Min. 6 characters" minlength="6" required></div>
                        <div class="form-group"><label class="form-label">Confirm Password</label><input type="password" name="confirmPassword" class="form-input" placeholder="Re-enter password" required></div>
                        <div class="form-group"><label class="form-label">Role</label><select name="role" class="form-select" required><option value="USER">User</option><option value="STAFF">Staff</option><option value="ADMIN">Admin</option></select></div>
                        <button type="submit" class="btn-primary">Register User</button>
                    </form>
                </div>
            </div>

            <!-- Users List -->
            <div class="card">
                <div class="card-header"><div class="card-title">Registered Users</div></div>
                <div class="card-body">
                    <div class="user-count" th:text="${userCount} + ' registered user(s)'"></div>
                    <div class="table-wrap">
                        <table th:if="${!users.isEmpty()}">
                            <thead><tr><th>#</th><th>Username</th><th>Role</th><th>Actions</th></tr></thead>
                            <tbody>
                                <tr th:each="user, iterStat : ${users}" th:data-id="${user.id}" th:data-username="${user.username}" th:data-role="${user.role}">
                                    <td class="user-id" th:text="${iterStat.count}"></td>
                                    <td class="user-name-cell" th:text="${user.username}"></td>
                                    <td><span class="badge" th:classappend="${user.role=='ADMIN'} ? 'badge-admin' : (${user.role=='STAFF'} ? 'badge-staff' : 'badge-user')" th:text="${user.role}"></span></td>
                                    <td><div class="action-group">
                                        <button class="btn-role" onclick="openRoleModal(this)">Role</button>
                                        <button class="btn-password" onclick="openPasswordModal(this)">Password</button>
                                        <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post" style="display:inline" onsubmit="return confirm('Delete this user?')"><button type="submit" class="btn-delete">Delete</button></form>
                                    </div></td>
                                </tr>
                            </tbody>
                        </table>
                        <div class="empty-state" th:if="${users.isEmpty()}"><div class="empty-icon">👥</div><p>No users registered yet.</p></div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Role Modal -->
<div class="modal-overlay" id="roleModal">
    <div class="modal">
        <div class="modal-title">Change User Role</div>
        <form id="roleForm" method="post">
            <div class="form-group"><label class="form-label">Select New Role</label><select name="role" class="form-select" required><option value="USER">User</option><option value="STAFF">Staff</option><option value="ADMIN">Admin</option></select></div>
            <div class="modal-actions"><button type="button" class="btn-cancel" onclick="closeRoleModal()">Cancel</button><button type="submit" class="btn-modal">Update Role</button></div>
        </form>
    </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="passwordModal">
    <div class="modal">
        <div class="modal-title">Change User Password</div>
        <form id="passwordForm" method="post">
            <div class="form-group"><label class="form-label">New Password</label><input type="password" name="newPassword" class="form-input" placeholder="Min. 6 characters" minlength="6" required></div>
            <div class="modal-actions"><button type="button" class="btn-cancel" onclick="closePasswordModal()">Cancel</button><button type="submit" class="btn-modal">Change Password</button></div>
        </form>
    </div>
</div>

<script>
    function openRoleModal(btn){const row=btn.closest('tr');document.getElementById('roleForm').action='/users/role/'+row.dataset.id;document.querySelector('#roleModal select').value=row.dataset.role;document.getElementById('roleModal').classList.add('active')}
    function closeRoleModal(){document.getElementById('roleModal').classList.remove('active')}
    function openPasswordModal(btn){const row=btn.closest('tr');document.getElementById('passwordForm').action='/users/password/'+row.dataset.id;document.getElementById('passwordModal').classList.add('active')}
    function closePasswordModal(){document.getElementById('passwordModal').classList.remove('active')}
    ['roleModal','passwordModal'].forEach(id=>{document.getElementById(id).addEventListener('click',function(e){if(e.target===this)this.classList.remove('active')})});
</script>
</body>
</html>
