<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --primary: #3b82f6; --primary-dark: #2563eb; }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 30%, #f1f5f9 60%, #e2e8f0 100%);
            padding: 0;
            color: #111827;
            position: relative;
            overflow-x: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 15% 25%, rgba(59, 130, 246, 0.04) 0%, transparent 35%),
                radial-gradient(circle at 85% 75%, rgba(168, 85, 247, 0.04) 0%, transparent 35%),
                radial-gradient(circle at 50% 80%, rgba(34, 197, 94, 0.03) 0%, transparent 40%);
            z-index: 0;
            pointer-events: none;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            top: 5%;
            right: -50px;
            width: 250px;
            height: 250px;
            border: 2px solid rgba(59, 130, 246, 0.04);
            border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%;
            animation: morph 20s ease-in-out infinite;
        }

        .bg-shapes::after {
            content: '';
            position: absolute;
            bottom: 10%;
            left: -50px;
            width: 180px;
            height: 180px;
            border: 2px solid rgba(168, 85, 247, 0.03);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 18s ease-in-out infinite reverse;
        }

        @keyframes morph {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(15px, -15px) rotate(5deg); }
            50% { transform: translate(-10px, 10px) rotate(-5deg); }
            75% { transform: translate(10px, 5px) rotate(3deg); }
        }

        body::before {
            content: ''; position: fixed;
            width: 500px; height: 500px;
            background: rgba(59, 130, 246, 0.02); border-radius: 50%;
            top: -150px; left: -150px; pointer-events: none;
        }
        body::after {
            content: ''; position: fixed;
            width: 400px; height: 400px;
            background: rgba(59, 130, 246, 0.01); border-radius: 50%;
            bottom: -120px; right: -120px; pointer-events: none;
        }

        /* ── Topbar ── */
        .topbar {
            display: flex; align-items: center; gap: 14px;
            padding: 16px 28px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(209, 213, 219, 0.5);
            position: sticky; top: 0; z-index: 50;
        }
        .back-btn {
            color: #6b7280; text-decoration: none;
            font-size: 0.9rem; font-weight: 600;
            background: rgba(209, 213, 219, 0.4);
            border: 1px solid rgba(209, 213, 219, 0.6);
            padding: 8px 16px; border-radius: 10px; transition: all 0.3s;
        }
        .back-btn:hover { background: rgba(209, 213, 219, 0.6); color: #111827; }
        .page-title    { font-size: 1.75rem; color: #111827; font-weight: 700; }
        .page-subtitle { font-size: 0.8rem; color: #6b7280; font-weight: 400; }

        /* ── Alert ── */
        .alert {
            margin: 16px 28px 0;
            padding: 14px 20px; border-radius: 12px;
            font-size: 0.9rem; font-weight: 600;
            border: 1px solid rgba(209, 213, 219, 0.6);
        }
        .alert-success { background: rgba(34, 197, 94, 0.1); color: #059669; }
        .alert-danger  { background: rgba(220, 38, 38, 0.1); color: #dc2626; border-color: rgba(220, 38, 38, 0.2); }

        /* ── Page wrapper ── */
        .page { max-width: 1400px; margin: 0 auto; padding: 20px 28px 40px; position: relative; z-index: 1; }

        /* ── Card base ── */
        .card {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(209, 213, 219, 0.6);
            border-radius: 16px; padding: 28px;
            margin-bottom: 20px;
            animation: glow 3s ease-in-out infinite;
        }
        .card-title {
            font-size: 0.9rem; font-weight: 600; color: #111827;
            margin-bottom: 16px;
            display: flex; align-items: center; gap: 8px;
        }

        /* ── Two-column layout ── */
        .content-grid {
            display: grid;
            grid-template-columns: 380px 1fr;
            gap: 20px;
        }

        /* ── Register Form ── */
        .form-group {
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .form-label {
            font-size: 0.75rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.6px;
            color: #374151;
        }
        .form-input, .form-select {
            padding: 11px 14px;
            background: #f3f4f6;
            border: 1.5px solid rgba(209, 213, 219, 0.8);
            border-radius: 10px; color: #111827;
            font-family: 'Inter', sans-serif; font-size: 0.875rem;
            transition: all 0.3s;
        }
        .form-input::placeholder { color: rgba(107, 114, 128, 0.6); }
        .form-input:focus, .form-select:focus {
            outline: none; border-color: #3b82f6;
            background: #ffffff;
        }
        .form-select option { background: #ffffff; color: #111827; }

        .btn-register {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: #fff;
            border: none; border-radius: 10px;
            font-family: 'Inter', sans-serif; font-size: 0.95rem; font-weight: 700;
            cursor: pointer; transition: all 0.3s;
            box-shadow: 0 4px 18px rgba(59, 130, 246, 0.25);
        }
        .btn-register:hover { transform: translateY(-2px); box-shadow: 0 8px 26px rgba(59, 130, 246, 0.35); }

        /* ── Users Table ── */
        .user-count {
            font-size: 0.8rem;
            color: #6b7280;
            margin-bottom: 16px;
        }
        .table-wrap { overflow-x: auto; border-radius: 12px; border: 1px solid rgba(209, 213, 219, 0.5); }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: rgba(243, 244, 246, 0.8); }
        th {
            padding: 12px 14px; text-align: left;
            font-size: 0.68rem; font-weight: 600;
            text-transform: uppercase; letter-spacing: 0.7px;
            color: #374151; white-space: nowrap;
        }
        td {
            padding: 13px 14px; font-size: 0.875rem;
            color: #4b5563;
            border-top: 1px solid rgba(209, 213, 219, 0.5);
        }
        tbody tr { transition: background 0.15s; }
        tbody tr:hover { background: rgba(243, 244, 246, 0.5); }

        .user-id { font-family: monospace; font-size: 0.8rem; color: #6b7280; }
        .user-name { font-weight: 600; color: #111827; }

        .badge {
            display: inline-flex;
            padding: 4px 10px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 600;
        }
        .badge-admin { background: rgba(59, 130, 246, 0.12); color: #2563eb; border: 1px solid rgba(59, 130, 246, 0.2); }
        .badge-staff { background: rgba(34, 197, 94, 0.12); color: #059669; border: 1px solid rgba(34, 197, 94, 0.2); }
        .badge-user { background: rgba(217, 119, 6, 0.12); color: #b45309; border: 1px solid rgba(217, 119, 6, 0.2); }

        .action-group { display: flex; gap: 6px; flex-wrap: wrap; }
        .btn-action {
            padding: 6px 12px; border-radius: 8px; border: none;
            font-family: 'Inter', sans-serif; font-size: 0.78rem; font-weight: 600;
            cursor: pointer; transition: all 0.2s;
        }
        .btn-role {
            background: rgba(59, 130, 246, 0.12); color: #2563eb;
        }
        .btn-role:hover { background: rgba(59, 130, 246, 0.2); }
        .btn-password {
            background: rgba(217, 119, 6, 0.12); color: #b45309;
        }
        .btn-password:hover { background: rgba(217, 119, 6, 0.2); }
        .btn-delete {
            background: rgba(220, 38, 38, 0.12); color: #dc2626;
        }
        .btn-delete:hover { background: rgba(220, 38, 38, 0.2); }

        .empty-state { text-align: center; padding: 40px; color: #6b7280; }

        /* ── Modals ── */
        .modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.3); backdrop-filter: blur(6px);
            z-index: 200; align-items: center; justify-content: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: #ffffff; border: 1px solid rgba(209, 213, 219, 0.8);
            border-radius: 16px; padding: 30px; width: 100%; max-width: 400px;
            animation: slideUp 0.3s ease; box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }
        @keyframes slideUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes glow { 0%, 100% { box-shadow: 0 0 10px rgba(59, 130, 246, 0.2); } 50% { box-shadow: 0 0 20px rgba(59, 130, 246, 0.4), 0 0 40px rgba(59, 130, 246, 0.2); } }
        .modal-title { font-size: 1.1rem; font-weight: 700; color: #111827; margin-bottom: 22px; }
        .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
        .btn-cancel {
            padding: 10px 20px; background: transparent;
            border: 1.5px solid rgba(209, 213, 219, 0.8);
            border-radius: 9px; color: #6b7280;
            font-family: 'Inter', sans-serif; font-size: 0.875rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
        }
        .btn-cancel:hover { background: rgba(243, 244, 246, 0.8); }
        .btn-confirm {
            padding: 10px 24px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            border: none; border-radius: 9px; color: #fff;
            font-family: 'Inter', sans-serif; font-size: 0.9rem; font-weight: 700;
            cursor: pointer; transition: all 0.25s; box-shadow: 0 4px 14px rgba(59, 130, 246, 0.25);
        }
        .btn-confirm:hover { transform: translateY(-1px); box-shadow: 0 8px 20px rgba(59, 130, 246, 0.35); }

        @media (max-width: 1024px) {
            .content-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-shapes"></div>

<!-- Topbar -->
<div class="topbar">
    <a href="/dashboard" class="back-btn">← Back</a>
    <div>
        <div class="page-title">👤 User Management</div>
        <div class="page-subtitle">Register &amp; manage system users</div>
    </div>
</div>

<div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
<div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

<div class="page">
    <div class="content-grid">
        <!-- Register Form -->
        <div class="card">
            <div class="card-title">➕ Register New User</div>
            <form th:action="@{/users/register}" method="post">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input"
                           placeholder="e.g. juan123" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input"
                           placeholder="Min. 6 characters" minlength="6" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-input"
                           placeholder="Re-enter password" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select" required>
                        <option value="USER">User</option>
                        <option value="STAFF">Staff</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>

                <button type="submit" class="btn-register">Register User</button>
            </form>
        </div>

        <!-- Users List -->
        <div class="card">
            <div class="card-title">📋 Registered Users</div>
            <div class="user-count" th:text="${userCount} + ' registered user(s)'"></div>

            <div class="table-wrap" th:if="${!users.isEmpty()}">
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Username</th>
                            <th>Role</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user, iterStat : ${users}"
                            th:data-id="${user.id}"
                            th:data-username="${user.username}"
                            th:data-role="${user.role}">
                            <td class="user-id" th:text="${iterStat.count}"></td>
                            <td class="user-name" th:text="${user.username}"></td>
                            <td>
                                <span class="badge"
                                    th:classappend="${user.role=='ADMIN'} ? 'badge-admin' : (${user.role=='STAFF'} ? 'badge-staff' : 'badge-user')"
                                    th:text="${user.role}"></span>
                            </td>
                            <td>
                                <div class="action-group">
                                    <button class="btn-action btn-role" onclick="openRoleModal(this)">Role</button>
                                    <button class="btn-action btn-password" onclick="openPasswordModal(this)">Password</button>
                                    <form th:action="@{/users/delete/{id}(id=${user.id})}" method="post" style="display:inline;"
                                          onsubmit="return confirm('Delete this user?')">
                                        <button type="submit" class="btn-action btn-delete">Delete</button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <div class="empty-state" th:if="${users.isEmpty()}">
                <div style="font-size: 2rem; margin-bottom: 10px;">👥</div>
                <p>No users registered yet. Create one above!</p>
            </div>
        </div>
    </div>
</div>

<!-- Role Modal -->
<div class="modal-overlay" id="roleModal">
    <div class="modal">
        <div class="modal-title">Change User Role</div>
        <form id="roleForm" method="post">
            <div class="form-group">
                <label class="form-label">Select New Role</label>
                <select name="role" class="form-select" required>
                    <option value="USER">User</option>
                    <option value="STAFF">Staff</option>
                    <option value="ADMIN">Admin</option>
                </select>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closeRoleModal()">Cancel</button>
                <button type="submit" class="btn-confirm">Update Role</button>
            </div>
        </form>
    </div>
</div>

<!-- Password Modal -->
<div class="modal-overlay" id="passwordModal">
    <div class="modal">
        <div class="modal-title">Change User Password</div>
        <form id="passwordForm" method="post">
            <div class="form-group">
                <label class="form-label">New Password</label>
                <input type="password" name="newPassword" class="form-input"
                       placeholder="Min. 6 characters" minlength="6" required>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn-cancel" onclick="closePasswordModal()">Cancel</button>
                <button type="submit" class="btn-confirm">Change Password</button>
            </div>
        </form>
    </div>
</div>

<script>
    function openRoleModal(btn) {
        const row = btn.closest('tr');
        document.getElementById('roleForm').action = '/users/role/' + row.dataset.id;
        document.querySelector('#roleModal select').value = row.dataset.role;
        document.getElementById('roleModal').classList.add('open');
    }
    function closeRoleModal() {
        document.getElementById('roleModal').classList.remove('open');
    }

    function openPasswordModal(btn) {
        const row = btn.closest('tr');
        document.getElementById('passwordForm').action = '/users/password/' + row.dataset.id;
        document.getElementById('passwordModal').classList.add('open');
    }
    function closePasswordModal() {
        document.getElementById('passwordModal').classList.remove('open');
    }

    // Close on backdrop click
    ['roleModal', 'passwordModal'].forEach(id => {
        document.getElementById(id).addEventListener('click', function(e) {
            if (e.target === this) this.classList.remove('open');
        });
    });
</script>

</body>
</html>
