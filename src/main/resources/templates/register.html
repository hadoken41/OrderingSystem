<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 30%, #f1f5f9 60%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.03) 0%, transparent 50%);
            z-index: 0;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border: 2px solid rgba(59, 130, 246, 0.06);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 30s ease-in-out infinite;
        }

        .bg-shapes::after {
            content: '';
            position: absolute;
            bottom: -150px;
            right: -100px;
            width: 350px;
            height: 350px;
            border: 2px solid rgba(168, 85, 247, 0.04);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 25s ease-in-out infinite reverse;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.08);
            top: 10%;
            left: 10%;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(168, 85, 247, 0.06);
            bottom: 20%;
            right: 15%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 180px;
            height: 180px;
            background: rgba(34, 197, 94, 0.05);
            top: 50%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        @keyframes morph {
            0%, 100% { transform: translate(0, 0) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            25% { transform: translate(30px, -30px) rotate(10deg); border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
            50% { transform: translate(-20px, 20px) rotate(-10deg); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            75% { transform: translate(20px, 10px) rotate(5deg); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        .register-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 500px;
        }

        .register-card {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 20px;
            padding: 60px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.6s ease-out, glow 3s ease-in-out 0.6s infinite;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 10px rgba(59, 130, 246, 0.3); }
            50% { box-shadow: 0 25px 50px rgba(0, 0, 0, 0.3), 0 0 20px rgba(59, 130, 246, 0.6), 0 0 40px rgba(59, 130, 246, 0.3); }
        }

        .register-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .register-logo {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

        .register-title {
            font-size: 28px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 8px;
        }

.register-subtitle {
            font-size: 14px;
            color: #6b7280;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-select {
            padding: 13px 16px;
            background: #f3f4f6;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            color: #111827;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-select option {
            background: #ffffff;
            color: #111827;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #059669;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(209, 213, 219, 0.2);
        }

        .login-link-text {
            color: #6b7280;
            font-size: 13px;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #2563eb;
        }

        .register-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #e2e8f0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, .form-select {
            padding: 13px 16px;
            background: rgba(30, 41, 59, 0.7);
            border: 1.5px solid rgba(148, 163, 184, 0.3);
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #64748b;
        }

        .form-input:focus, .form-select:focus {
            outline: none;
            border-color: #3b82f6;
            background: rgba(30, 41, 59, 0.9);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .form-select {
            cursor: pointer;
        }

        .form-select option {
            background: #1e293b;
            color: #f1f5f9;
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        .success-msg {
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #059669;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        .register-button {
            padding: 13px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .register-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid rgba(148, 163, 184, 0.1);
        }

        .login-link-text {
            color: #6b7280;
            font-size: 13px;
        }

        .login-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .login-link a:hover {
            color: #2563eb;
        }

        @media (max-width: 480px) {
            .register-card {
                padding: 40px 30px;
            }

            .register-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-shapes"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    <div class="register-wrapper">
        <div class="register-card">
            <div class="register-header">
                <div class="register-logo">📝</div>
                <h1 class="register-title">Create Account</h1>
                <p class="register-subtitle">Join the ordering system</p>
            </div>

            <div th:if="${error}" class="error-msg" th:text="${error}"></div>

            <form class="register-form" th:action="@{/register}" method="post" autocomplete="off">
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-input" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-input" minlength="6" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" name="confirmPassword" class="form-input" minlength="6" required autocomplete="new-password">
                </div>

                <div class="form-group">
                    <label class="form-label">Role</label>
                    <select name="role" class="form-select" required>
                        <option value="USER">User</option>
                        <option value="STAFF">Staff</option>
                        <option value="ADMIN">Admin</option>
                    </select>
                </div>

                <button type="submit" class="register-button">Create Account</button>
            </form>

            <div class="login-link">
                <span class="login-link-text">
                    Already have account? <a href="/login">Sign In</a>
                </span>
            </div>
        </div>
    </div>

    <script>
        // Clear all form fields immediately and on load
        function clearFields() {
            document.querySelectorAll('input[type="text"], input[type="password"]').forEach(function(input) {
                input.value = '';
            });
        }

        // Run on DOM ready
        document.addEventListener('DOMContentLoaded', function() {
            clearFields();
            // Also run after slight delays to catch late autofill
            setTimeout(clearFields, 100);
            setTimeout(clearFields, 500);
        });

        // Run on page load
        window.addEventListener('load', function() {
            clearFields();
            setTimeout(clearFields, 100);
        });
    </script>
</body>
</html>
