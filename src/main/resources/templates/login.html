<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — Ordering System</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --g1: #6C63FF;
            --g2: #A855F7;
            --g3: #EC4899;
            --g4: #3B82F6;
            --g5: #06B6D4;
            --text: #1a1a2e;
            --text2: #555577;
            --text3: #aaaacc;
            --red: #ef4444;
            --white: #ffffff;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            background: #f4f4fb;
        }

        /* ── LEFT PANEL ── */
        .left-panel {
            width: 52%;
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            background: #0f0c29;
        }

        /* Animated wavy mesh background */
        .left-panel canvas {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
        }

        /* SVG wave blobs */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(72px);
            mix-blend-mode: screen;
            animation: drift 12s ease-in-out infinite alternate;
        }
        .blob-1 {
            width: 520px; height: 520px;
            background: radial-gradient(circle, rgba(108,99,255,0.85) 0%, transparent 70%);
            top: -120px; left: -120px;
            animation-delay: 0s;
        }
        .blob-2 {
            width: 420px; height: 420px;
            background: radial-gradient(circle, rgba(168,85,247,0.75) 0%, transparent 70%);
            bottom: -80px; left: 60px;
            animation-delay: -3s;
        }
        .blob-3 {
            width: 380px; height: 380px;
            background: radial-gradient(circle, rgba(236,72,153,0.7) 0%, transparent 70%);
            top: 30%; right: -80px;
            animation-delay: -6s;
        }
        .blob-4 {
            width: 300px; height: 300px;
            background: radial-gradient(circle, rgba(59,130,246,0.6) 0%, transparent 70%);
            top: 10%; right: 10%;
            animation-delay: -4s;
        }
        .blob-5 {
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(6,182,212,0.55) 0%, transparent 70%);
            bottom: 15%; right: 5%;
            animation-delay: -8s;
        }

        @keyframes drift {
            0%   { transform: translate(0, 0) scale(1); }
            33%  { transform: translate(30px, -40px) scale(1.08); }
            66%  { transform: translate(-20px, 30px) scale(0.94); }
            100% { transform: translate(15px, 15px) scale(1.04); }
        }

        /* Wavy SVG overlay */
        .wave-overlay {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Grain texture overlay */
        .grain {
            position: absolute;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            opacity: 0.35;
            pointer-events: none;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 48px 40px;
            background: #f4f4fb;
        }

        .login-box {
            width: 100%;
            max-width: 400px;
            background: var(--white);
            border-radius: 24px;
            padding: 52px 44px 48px;
            box-shadow:
                0 4px 6px rgba(108,99,255,0.04),
                0 20px 60px rgba(108,99,255,0.10),
                0 40px 100px rgba(168,85,247,0.08);
        }

        /* Brand mark */
        .brand-mark {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 36px;
        }
        .brand-icon {
            width: 38px; height: 38px;
            background: linear-gradient(135deg, var(--g1), var(--g3));
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
        }
        .brand-icon svg { width: 20px; height: 20px; fill: none; stroke: white; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .brand-name {
            font-size: 14px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.2px;
        }

        .login-heading {
            font-size: 27px;
            font-weight: 800;
            color: var(--text);
            letter-spacing: -0.8px;
            line-height: 1.15;
            margin-bottom: 8px;
        }
        .login-heading span {
            background: linear-gradient(90deg, var(--g1), var(--g3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .login-sub {
            font-size: 13.5px;
            color: var(--text3);
            margin-bottom: 38px;
            font-weight: 400;
        }

        /* ── Input fields: line-only style ── */
        .form-group {
            margin-bottom: 30px;
            position: relative;
        }
        .form-label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .input-wrap {
            position: relative;
        }
        .form-input {
            width: 100%;
            padding: 8px 0 10px;
            background: transparent;
            border: none;
            border-bottom: 1.5px solid #e2e2f0;
            border-radius: 0;
            color: var(--text);
            font-family: 'Poppins', sans-serif;
            font-size: 14.5px;
            font-weight: 500;
            transition: border-color 0.2s;
            outline: none;
        }
        .form-input::placeholder { color: #c8c8e0; font-weight: 400; }

        /* Gradient underline on focus */
        .input-line {
            position: absolute;
            bottom: 0; left: 0;
            width: 0; height: 2px;
            background: linear-gradient(90deg, var(--g1), var(--g2), var(--g3));
            border-radius: 2px;
            transition: width 0.35s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .form-input:focus ~ .input-line { width: 100%; }

        /* Error */
        .error-msg {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #fff1f2;
            border: 1px solid #fecdd3;
            color: var(--red);
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 12.5px;
            font-weight: 500;
            margin-bottom: 24px;
        }

        /* ── SUBMIT button ── */
        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(110deg, var(--g4) 0%, var(--g1) 40%, var(--g2) 70%, var(--g3) 100%);
            background-size: 200% 100%;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 13.5px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            transition: background-position 0.4s ease, transform 0.15s, box-shadow 0.2s;
            box-shadow: 0 4px 20px rgba(168,85,247,0.35);
            margin-top: 8px;
        }
        .login-btn:hover {
            background-position: right center;
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(168,85,247,0.45);
        }
        .login-btn:active { transform: translateY(0); box-shadow: 0 4px 16px rgba(168,85,247,0.3); }

        /* ── Divider & register ── */
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 28px 0 20px;
            color: #d0d0e8;
            font-size: 11px;
            letter-spacing: 0.5px;
        }
        .divider::before, .divider::after {
            content: ''; flex: 1; height: 1px; background: #ebebf5;
        }
        .register-link {
            text-align: center;
            font-size: 13px;
            color: var(--text3);
        }
        .register-link a {
            font-weight: 600;
            background: linear-gradient(90deg, var(--g1), var(--g3));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
            transition: opacity 0.15s;
        }
        .register-link a:hover { opacity: 0.75; }

        @media (max-width: 860px) {
            .left-panel { display: none; }
            .right-panel { padding: 32px 20px; }
            .login-box { padding: 40px 32px 36px; }
        }
    </style>
</head>
<body>

    <!-- ── LEFT: Abstract wavy gradient panel ── -->
    <div class="left-panel">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
        <div class="blob blob-4"></div>
        <div class="blob blob-5"></div>

        <!-- Animated SVG wave lines -->
        <svg class="wave-overlay" viewBox="0 0 600 900" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <linearGradient id="wg1" x1="0%" y1="0%" x2="100%" y2="100%">
                    <stop offset="0%" stop-color="#6C63FF" stop-opacity="0.5"/>
                    <stop offset="100%" stop-color="#EC4899" stop-opacity="0.3"/>
                </linearGradient>
                <linearGradient id="wg2" x1="100%" y1="0%" x2="0%" y2="100%">
                    <stop offset="0%" stop-color="#A855F7" stop-opacity="0.4"/>
                    <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.25"/>
                </linearGradient>
            </defs>

            <!-- Wave curves -->
            <path d="M-60 200 C 100 100, 300 350, 500 200 S 700 50, 900 200" stroke="url(#wg1)" stroke-width="2.5" fill="none" opacity="0.6">
                <animate attributeName="d" dur="9s" repeatCount="indefinite"
                    values="M-60 200 C 100 100, 300 350, 500 200 S 700 50, 900 200;
                            M-60 250 C 120 130, 280 300, 520 240 S 720 80, 900 180;
                            M-60 200 C 100 100, 300 350, 500 200 S 700 50, 900 200" />
            </path>
            <path d="M-60 400 C 80 300, 250 550, 500 400 S 720 250, 900 400" stroke="url(#wg1)" stroke-width="2" fill="none" opacity="0.5">
                <animate attributeName="d" dur="11s" repeatCount="indefinite"
                    values="M-60 400 C 80 300, 250 550, 500 400 S 720 250, 900 400;
                            M-60 370 C 100 320, 270 520, 480 380 S 700 280, 900 370;
                            M-60 400 C 80 300, 250 550, 500 400 S 720 250, 900 400" />
            </path>
            <path d="M-60 600 C 120 500, 350 750, 560 600 S 750 450, 900 600" stroke="url(#wg2)" stroke-width="1.8" fill="none" opacity="0.45">
                <animate attributeName="d" dur="13s" repeatCount="indefinite"
                    values="M-60 600 C 120 500, 350 750, 560 600 S 750 450, 900 600;
                            M-60 580 C 100 520, 330 720, 540 580 S 740 470, 900 580;
                            M-60 600 C 120 500, 350 750, 560 600 S 750 450, 900 600" />
            </path>
            <path d="M-60 750 C 200 650, 350 900, 600 750 S 800 600, 960 750" stroke="url(#wg2)" stroke-width="1.5" fill="none" opacity="0.4">
                <animate attributeName="d" dur="10s" repeatCount="indefinite"
                    values="M-60 750 C 200 650, 350 900, 600 750 S 800 600, 960 750;
                            M-60 720 C 180 640, 370 880, 580 720 S 780 620, 960 720;
                            M-60 750 C 200 650, 350 900, 600 750 S 800 600, 960 750" />
            </path>
            <!-- Thinner accent lines -->
            <path d="M0 100 C 200 0, 400 200, 600 100" stroke="#A855F7" stroke-width="1" fill="none" opacity="0.3">
                <animate attributeName="d" dur="7s" repeatCount="indefinite"
                    values="M0 100 C 200 0, 400 200, 600 100;
                            M0 120 C 180 20, 420 180, 600 80;
                            M0 100 C 200 0, 400 200, 600 100" />
            </path>
            <path d="M0 850 C 200 780, 450 920, 660 850" stroke="#EC4899" stroke-width="1" fill="none" opacity="0.3">
                <animate attributeName="d" dur="8s" repeatCount="indefinite"
                    values="M0 850 C 200 780, 450 920, 660 850;
                            M0 830 C 220 760, 430 900, 660 870;
                            M0 850 C 200 780, 450 920, 660 850" />
            </path>
        </svg>

        <div class="grain"></div>
    </div>

    <!-- ── RIGHT: Login form ── -->
    <div class="right-panel">
        <div class="login-box">

            <!-- Brand -->
            <div class="brand-mark">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2"/>
                        <rect x="9" y="3" width="6" height="4" rx="1"/>
                        <line x1="9" y1="12" x2="15" y2="12"/>
                        <line x1="9" y1="16" x2="13" y2="16"/>
                    </svg>
                </div>
                <div class="brand-name">Ordering System</div>
            </div>

            <h1 class="login-heading">Welcome<br><span>back.</span></h1>
            <p class="login-sub">Sign in to continue to your dashboard</p>

            <form action="/login" method="post" autocomplete="off">

                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <div class="input-wrap">
                        <input type="text" id="username" name="username" class="form-input"
                               placeholder="Enter your username" required autocomplete="new-password">
                        <span class="input-line"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <div class="input-wrap">
                        <input type="password" id="password" name="password" class="form-input"
                               placeholder="Enter your password" required autocomplete="new-password">
                        <span class="input-line"></span>
                    </div>
                </div>

                <button type="submit" class="login-btn">Sign In</button>
            </form>

            <div class="divider">or</div>

            <div class="register-link">
                Don't have an account? <a href="/register">Create one here</a>
            </div>
        </div>
    </div>

    <script>
        function clearFields() {
            const u = document.getElementById('username');
            const p = document.getElementById('password');
            if (u) u.value = '';
            if (p) p.value = '';
        }
        document.addEventListener('DOMContentLoaded', () => { clearFields(); setTimeout(clearFields, 100); setTimeout(clearFields, 500); });
        window.addEventListener('load', () => { clearFields(); setTimeout(clearFields, 100); });
    </script>
</body>
</html>
