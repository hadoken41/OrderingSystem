cat << 'LOGINEOF' > /home/claude/pages/login.html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign In — OrderFlow</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#03050d;--gb:rgba(255,255,255,0.06);--gbb:rgba(255,255,255,0.08);--p:#7c6ff7;--pg:rgba(124,111,247,0.28);--t:#eef2ff;--d:#8892a4;--m:#2d3552}
html,body{height:100%}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t);display:flex;align-items:center;justify-content:center;min-height:100vh;overflow:hidden}
.aurora{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.al{position:absolute;border-radius:50%;filter:blur(90px);animation:drift linear infinite}
.a1{width:800px;height:600px;background:radial-gradient(ellipse,rgba(124,111,247,.18) 0%,transparent 70%);top:-180px;left:-220px;animation-duration:22s}
.a2{width:650px;height:650px;background:radial-gradient(ellipse,rgba(34,211,238,.12) 0%,transparent 70%);top:25%;right:-180px;animation-duration:27s;animation-delay:-9s}
.a3{width:550px;height:450px;background:radial-gradient(ellipse,rgba(16,185,129,.09) 0%,transparent 70%);bottom:-120px;left:15%;animation-duration:19s;animation-delay:-6s}
.a4{width:380px;height:380px;background:radial-gradient(ellipse,rgba(244,114,182,.08) 0%,transparent 70%);bottom:8%;right:8%;animation-duration:24s;animation-delay:-14s}
@keyframes drift{0%{transform:translate(0,0) rotate(0deg) scale(1)}25%{transform:translate(55px,-45px) rotate(7deg) scale(1.06)}50%{transform:translate(-38px,58px) rotate(-6deg) scale(.93)}75%{transform:translate(28px,22px) rotate(11deg) scale(1.08)}100%{transform:translate(0,0) rotate(0deg) scale(1)}}
.noise{position:fixed;inset:0;z-index:1;opacity:.032;pointer-events:none;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");background-size:180px}
.grid{position:fixed;inset:0;z-index:1;pointer-events:none;background:linear-gradient(rgba(124,111,247,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(124,111,247,.028) 1px,transparent 1px);background-size:52px 52px}
.wrap{position:relative;z-index:10;width:100%;max-width:400px;padding:24px}
.brand{text-align:center;margin-bottom:32px}
.bmark{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;border-radius:17px;font-size:26px;margin-bottom:14px;background:linear-gradient(135deg,#7c6ff7,#22d3ee);box-shadow:0 0 40px rgba(124,111,247,.55),0 0 80px rgba(124,111,247,.2)}
.bname{font-family:'Syne',sans-serif;font-size:27px;font-weight:800;letter-spacing:-.5px}
.bname span{background:linear-gradient(90deg,#7c6ff7,#22d3ee);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.bsub{font-size:13px;color:var(--d);margin-top:5px}
.card{background:rgba(255,255,255,.024);backdrop-filter:blur(40px) saturate(200%);border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:36px;box-shadow:0 0 0 1px rgba(124,111,247,.07),0 40px 80px rgba(0,0,0,.55),inset 0 1px 0 rgba(255,255,255,.07);animation:ci .6s cubic-bezier(.16,1,.3,1)}
@keyframes ci{from{opacity:0;transform:translateY(28px) scale(.97)}to{opacity:1;transform:translateY(0) scale(1)}}
.err{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.22);color:#fca5a5;padding:11px 14px;border-radius:10px;font-size:12.5px;text-align:center;margin-bottom:18px}
.field{margin-bottom:18px}
.field label{display:block;font-size:10.5px;font-weight:600;text-transform:uppercase;letter-spacing:1.2px;color:var(--d);margin-bottom:8px}
.field input{width:100%;padding:12px 15px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:11px;color:var(--t);font-family:'DM Sans',sans-serif;font-size:14px;transition:all .25s}
.field input::placeholder{color:var(--m)}
.field input:focus{outline:none;border-color:rgba(124,111,247,.55);background:rgba(124,111,247,.06);box-shadow:0 0 0 3px rgba(124,111,247,.14),0 0 24px rgba(124,111,247,.12)}
.btn{width:100%;padding:13px;margin-top:6px;border:none;border-radius:11px;background:linear-gradient(135deg,#7c6ff7 0%,#5b50e8 100%);color:#fff;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .25s;box-shadow:0 4px 22px rgba(124,111,247,.42),0 0 40px rgba(124,111,247,.15)}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 34px rgba(124,111,247,.58),0 0 60px rgba(124,111,247,.22)}
.sep{display:flex;align-items:center;gap:12px;margin:22px 0}
.sl{flex:1;height:1px;background:rgba(255,255,255,.07)}
.st{font-size:11px;color:var(--m)}
.flink{text-align:center;font-size:13px;color:var(--d)}
.flink a{color:#a5b4fc;text-decoration:none;font-weight:600}
.flink a:hover{color:#c7d2fe}
</style>
</head>
<body>
<div class="aurora"><div class="al a1"></div><div class="al a2"></div><div class="al a3"></div><div class="al a4"></div></div>
<div class="noise"></div><div class="grid"></div>
<div class="wrap">
  <div class="brand">
    <div class="bmark">📦</div>
    <div class="bname">Order<span>Flow</span></div>
    <div class="bsub">Sign in to your workspace</div>
  </div>
  <div class="card">
    <div th:if="${param.error}" class="err">⚠ Invalid username or password</div>
    <form th:action="@{/login}" method="post" autocomplete="off">
      <div class="field"><label>Username</label><input type="text" name="username" placeholder="Enter your username" autocomplete="new-password"></div>
      <div class="field"><label>Password</label><input type="password" name="password" placeholder="••••••••" autocomplete="new-password"></div>
      <button type="submit" class="btn">Sign In →</button>
    </form>
    <div class="sep"><div class="sl"></div><div class="st">OR</div><div class="sl"></div></div>
    <div class="flink">New here? <a href="/register">Create account</a></div>
  </div>
</div>
</body>
</html>
