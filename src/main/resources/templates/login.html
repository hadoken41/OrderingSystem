<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ordering System</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 30%, #f1f5f9 60%, #e2e8f0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(34, 197, 94, 0.03) 0%, transparent 50%);
            z-index: 0;
        }

        .bg-shapes {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 0;
            overflow: hidden;
        }

        .bg-shapes::before {
            content: '';
            position: absolute;
            top: -100px;
            left: -100px;
            width: 400px;
            height: 400px;
            border: 2px solid rgba(59, 130, 246, 0.06);
            border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%;
            animation: morph 30s ease-in-out infinite;
        }

        .bg-shapes::after {
            content: '';
            position: absolute;
            bottom: -150px;
            right: -100px;
            width: 350px;
            height: 350px;
            border: 2px solid rgba(168, 85, 247, 0.04);
            border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
            animation: morph 25s ease-in-out infinite reverse;
        }

        .floating-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: floatOrb 20s ease-in-out infinite;
        }

        .orb-1 {
            width: 300px;
            height: 300px;
            background: rgba(59, 130, 246, 0.08);
            top: 10%;
            left: 10%;
        }

        .orb-2 {
            width: 250px;
            height: 250px;
            background: rgba(168, 85, 247, 0.06);
            bottom: 20%;
            right: 15%;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 180px;
            height: 180px;
            background: rgba(34, 197, 94, 0.05);
            top: 50%;
            left: 60%;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, -30px); }
        }

        @keyframes morph {
            0%, 100% { transform: translate(0, 0) rotate(0deg); border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; }
            25% { transform: translate(30px, -30px) rotate(10deg); border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; }
            50% { transform: translate(-20px, 20px) rotate(-10deg); border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; }
            75% { transform: translate(20px, 10px) rotate(5deg); border-radius: 30% 70% 70% 30% / 30% 30% 70% 70%; }
        }

        @keyframes floatOrb {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33% { transform: translate(30px, -40px) scale(1.1); }
            66% { transform: translate(-20px, 20px) scale(0.9); }
        }

        /* Login container */
        .login-wrapper {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 480px;
        }

        .login-card {
            background: #ffffff;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(59, 130, 246, 0.1);
            border-radius: 20px;
            padding: 60px 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
            animation: slideUp 0.6s ease-out, glow 3s ease-in-out 0.6s infinite;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes glow {
            0%, 100% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 0 10px rgba(59, 130, 246, 0.2); }
            50% { box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 0 20px rgba(59, 130, 246, 0.4), 0 0 40px rgba(59, 130, 246, 0.2); }
        }

        /* Header */
        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo {
            font-size: 2.5rem;
            margin-bottom: 16px;
        }

.login-title {
            font-size: 28px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 6px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #6b7280;
            font-weight: 400;
        }

        /* Form */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

.form-label {
            font-size: 13px;
            font-weight: 600;
            color: #374151;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            padding: 13px 16px;
            background: #f3f4f6;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            color: #111827;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: #9ca3af;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        /* Error message */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #dc2626;
            padding: 12px 14px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 10px;
        }

        /* Login button */
        .login-button {
            padding: 13px 20px;
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(59, 130, 246, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        /* Register link */
        .register-link {
            text-align: center;
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e5e7eb;
        }

        .register-link-text {
            color: #6b7280;
            font-size: 13px;
        }

        .register-link a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s ease;
        }

        .register-link a:hover {
            color: #2563eb;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 40px 30px;
            }

            .login-title {
                font-size: 24px;
            }

            .login-button {
                padding: 12px 16px;
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    <div class="bg-shapes"></div>
    <div class="floating-orb orb-1"></div>
    <div class="floating-orb orb-2"></div>
    <div class="floating-orb orb-3"></div>
    <div class="login-wrapper">
        <div class="login-card">
            <!-- Header -->
            <div class="login-header">
                <div class="logo">📦</div>
                <h1 class="login-title">Ordering System</h1>
                <p class="login-subtitle">Access your dashboard</p>
            </div>

            <!-- Form -->
            <form class="login-form" th:action="@{/login}" method="post" autocomplete="off">
                <!-- Error message -->
                <div th:if="${param.error}" class="error-msg">
                    Invalid credentials
                </div>

                <!-- Username -->
                <div class="form-group">
                    <label class="form-label" for="username">Username</label>
                    <input type="text" id="username" name="username" class="form-input" required autocomplete="new-password">
                </div>

                <!-- Password -->
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-input" required autocomplete="new-password">
                </div>

                <!-- Login button -->
                <button type="submit" class="login-button">Sign In</button>
            </form>

            <!-- Register link -->
            <div class="register-link">
                <span class="register-link-text">
                    New user? <a href="/register">Create account</a>
                </span>
            </div>
        </div>
    </div>

    <script>
        // Clear all fields immediately and on load
        function clearFields() {
            const usernameField = document.getElementById('username');
            const passwordField = document.getElementById('password');
            if (usernameField) usernameField.value = '';
            if (passwordField) passwordField.value = '';
        }

        // Run on DOM ready
        document.addEventListener('DOMContentLoaded', function() {
            clearFields();
            // Also run after a slight delay to catch late autofill
            setTimeout(clearFields, 100);
            setTimeout(clearFields, 500);
        });

        // Run on page load
        window.addEventListener('load', function() {
            clearFields();
            setTimeout(clearFields, 100);
        });
    </script>
</body>
</html>
